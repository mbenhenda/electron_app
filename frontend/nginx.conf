server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: route all paths to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache fingerprinted assets indefinitely
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Don't cache the HTML entry point
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
